## gorich v0.1.0 — Initial Release

Beautiful terminal output for Go, inspired by Python's `rich` library.

### What's included:
- Styled text with markup syntax `[bold red]text[/]`
- Tables with multiple border styles, alignment, and column styling
- Panels with titles, subtitles, and padding
- Horizontal rules / dividers
- Tree views
- Progress bars with ETA and the `Track()` generic helper
- Terminal spinners + `WithSpinner()` convenience wrapper
- Syntax highlighting for Go, Python, and JSON
- Log levels (INFO / SUCCESS / WARNING / ERROR / DEBUG)
- `Inspect()` for pretty-printing values
- Multi-column layout
- True-color, 256-color, and ANSI color support
- Everything writes to `io.Writer` — perfect for AI agents, tests, and CLIs

**Install:** `go get github.com/njchilds90/gorich@v0.1.0`

**Docs:** https://pkg.go.dev/github.com/njchilds90/gorich
